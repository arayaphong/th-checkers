<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>เกมส์หมากฮอส - Thai Checkers</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div id="game-status">
    <div class="player-card" id="card-p1">ผู้เล่น 1 <span class="icon-p1">🔴</span></div>
    <div class="player-card" id="card-p2">ผู้เล่น 2 ⚫</div>
    <span id="turn-announcement" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></span>
  </div>
</header>

<div
  id="too-small-overlay"
  role="alertdialog"
  aria-modal="true"
  aria-labelledby="too-small-title"
  aria-describedby="too-small-desc"
  aria-hidden="true"
  tabindex="-1"
  style="
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg-color);
  z-index: 9999;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  gap: 12px;
  text-align: center;
  padding: 20px;
">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="48" height="48" fill="#f1c40f">
    <path d="M256 32c14.2 0 27.3 7.5 34.5 19.8l216 368c7.3 12.4 7.3 27.7 .2 40.1S486.3 480 472 480H40c-14.3 0-27.6-7.7-34.7-20.1s-7-27.8 .2-40.1l216-368C228.7 39.5 241.8 32 256 32zm0 128c-13.3 0-24 10.7-24 24V296c0 13.3 10.7 24 24 24s24-10.7 24-24V184c0-13.3-10.7-24-24-24zm32 224a32 32 0 1 0 -64 0 32 32 0 1 0 64 0z"/>
  </svg>
  <p id="too-small-title" style="font-size: 1.1rem; font-weight: bold; color: var(--primary-color);">แสดงผลไม่ได้</p>
  <p id="too-small-desc" style="font-size: 0.85rem; color: #aaa;">พื้นที่แสดงผลเล็กเกินไป<br>กรุณาขยายหน้าต่างให้ใหญ่ขึ้น</p>
</div>

<!-- ป๊อบอัพจบเกม -->
<div id="game-over-overlay" aria-hidden="true">
  <div
    class="game-over-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="winner-title"
    aria-describedby="winner-desc"
  >
    <h2 id="winner-title" class="game-over-title">ผู้เล่น 1 ชนะ!</h2>
    <p id="winner-desc" class="game-over-desc">ฝ่ายตรงข้ามไม่มีหมากเหลือให้เดิน</p>
    <div class="game-over-actions">
      <button id="btn-review-game" class="btn-review-game">ดูกระดาน</button>
      <button id="btn-play-again" class="btn-play-again">เล่นใหม่อีกครั้ง</button>
    </div>
  </div>
</div>

<section>
  <div id="stars-bg" class="stars-bg"></div>

  <!-- ส่วนกระดาน (Board) -->
  <div class="board-container">
    <div class="board-wrapper">
      <div class="board-col-labels">
        <span>A</span><span>B</span><span>C</span><span>D</span>
        <span>E</span><span>F</span><span>G</span><span>H</span>
      </div>
      <div class="board-row-labels">
        <span>1</span><span>2</span><span>3</span><span>4</span>
        <span>5</span><span>6</span><span>7</span><span>8</span>
      </div>
      <div class="board" id="board" role="grid" aria-label="กระดานหมากฮอส" aria-rowcount="8" aria-colcount="8">
        <!-- ช่องตารางจะถูกสร้างด้วย JavaScript -->
      </div>
    </div>
  </div>

  <!-- ส่วนควบคุม (Control) -->
  <div class="controls">
    <div id="stats-panel">
      <div class="stats-row">
        <span class="stats-label">ผู้เล่น 1</span>
        <div class="captured-list" id="captured-by-p1"></div>
      </div>
      <hr class="stats-divider">
      <div class="stats-row">
        <span class="stats-label">ผู้เล่น 2</span>
        <div class="captured-list" id="captured-by-p2"></div>
      </div>
    </div>
    <ul>
      <li><button id="btn-undo" title="ย้อนกลับ (Undo)" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" width="20" height="20" fill="currentColor"><path d="M9.4 233.4c-12.5 12.5-12.5 32.8 0 45.3l160 160c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L109.2 288 416 288c17.7 0 32-14.3 32-32s-14.3-32-32-32l-306.7 0 105.4-105.4c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0l-160 160z"/></svg>
      </button></li>
      <li><button id="btn-redo" title="ทำซ้ำ (Redo)" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" width="20" height="20" fill="currentColor"><path d="M438.6 278.6c12.5-12.5 12.5-32.8 0-45.3l-160-160c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L338.8 224 32 224c-17.7 0-32 14.3-32 32s14.3 32 32 32l306.7 0L233.4 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l160-160z"/></svg>
      </button></li>
      <li><button id="btn-reset" class="btn-reset" title="เริ่มเกมใหม่ (Reset)">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="20" height="20" fill="currentColor"><path d="M105.1 202.6c7.7-21.8 20.2-42.3 37.8-59.8c62.5-62.5 163.8-62.5 226.3 0L386.3 160H336c-17.7 0-32 14.3-32 32s14.3 32 32 32H464c17.7 0 32-14.3 32-32V64c0-17.7-14.3-32-32-32s-32 14.3-32 32v51.2L414.4 97.6c-87.5-87.5-229.3-87.5-316.8 0C73.2 121.9 55.6 150.7 44.8 181.4c-5.9 16.7 2.9 34.9 19.5 40.8s34.9-2.9 40.8-19.5zM39 289.3c-5 1.5-9.8 4.2-13.7 8.2c-4 4-6.7 8.8-8.1 14c-.3 1.2-.6 2.5-.8 3.8c-.3 1.7-.4 3.4-.4 5.1V448c0 17.7 14.3 32 32 32s32-14.3 32-32V396.9l17.6 17.5c87.5 87.4 229.3 87.4 316.7 0c24.4-24.4 42.1-53.1 52.9-83.7c5.9-16.7-2.9-34.9-19.5-40.8s-34.9 2.9-40.8 19.5c-7.7 21.8-20.2 42.3-37.8 59.8c-62.5 62.5-163.8 62.5-226.3 0l-.1-.1L125.6 352H176c17.7 0 32-14.3 32-32s-14.3-32-32-32H48.4c-1.6 0-3.2 .1-4.8 .3s-3.1 .5-4.6 1z"/></svg>
      </button></li>
    </ul>
    <div id="history-stack">
      <div class="history-label" id="history-label">ประวัติการเดิน</div>
      <div id="history-list-wrapper">
        <div id="history-list" role="list" aria-labelledby="history-label"></div>
      </div>
    </div>
  </div>
</section>

<script type="module" src="game.js"></script>
</body>
</html>
